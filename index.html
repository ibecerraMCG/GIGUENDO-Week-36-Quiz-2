<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 36 Practice Quiz 2</title>

    <style>
        /* --- CSS Variables & Themes --- */
        :root {
            --transition-speed: 0.3s;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            
            /* Default Feedback Colors (Fallback for custom themes) */
            --feedback-success-bg: #064e3b;
            --feedback-success-border: #059669;
            --feedback-success-text: #a7f3d0;
            --feedback-error-bg: #7f1d1d;
            --feedback-error-border: #dc2626;
            --feedback-error-text: #fecaca;
        }[data-theme="dark"] {
            --bg-body: #1e293b; --bg-card: #334155; --bg-header: #0f172a;
            --text-main: #f1f5f9; --text-muted: #94a3b8; --text-accent: #38bdf8;
            --border-color: #475569; --highlight-bg: #475569;
            --button-bg: #38bdf8; --button-text: #0f172a; --button-hover: #0ea5e9;
        }

        [data-theme="light"] {
            --bg-body: #f3f4f6; --bg-card: #ffffff; --bg-header: #ffffff;
            --text-main: #1f2937; --text-muted: #6b7280; --text-accent: #2563eb;
            --border-color: #e5e7eb; --highlight-bg: #f3f4f6;
            --button-bg: #2563eb; --button-text: #ffffff; --button-hover: #1d4ed8;
            --feedback-success-bg: #ecfdf5; --feedback-success-border: #34d399; --feedback-success-text: #065f46;
            --feedback-error-bg: #fef2f2; --feedback-error-border: #f87171; --feedback-error-text: #991b1b;
        }[data-theme="midnight"] {
            --bg-body: #000000; --bg-card: #000000; --bg-header: #000000;
            --text-main: #e0e0e0; --text-muted: #888888; --text-accent: #90caf9;
            --border-color: #333333; --highlight-bg: #1a1a1a;
            --button-bg: #90caf9; --button-text: #000000; --button-hover: #42a5f5;
            --feedback-success-bg: #051b11; --feedback-success-border: #0f5132; --feedback-success-text: #75b798;
            --feedback-error-bg: #2c0b0e; --feedback-error-border: #842029; --feedback-error-text: #ea868f;
        }[data-theme="legacy-dark"] {
            --bg-body: #2d343e; --bg-card: #3c424f; --bg-header: #3c424f;
            --text-main: #e8e6e3; --text-muted: #b0c4de; --text-accent: #8ab4f8;
            --border-color: #555; --highlight-bg: #454c5a;
            --button-bg: #8ab4f8; --button-text: #202124; --button-hover: #a3c5f9;
            --feedback-success-bg: #344e41; --feedback-success-border: #52b788; --feedback-success-text: #c7f9cc;
            --feedback-error-bg: #5e2129; --feedback-error-border: #a4133c; --feedback-error-text: #f8d7da;
        }[data-theme="sepia"] {
            --bg-body: #f4ecd8; --bg-card: #fdf6e3; --bg-header: #e4d5b7;
            --text-main: #433422; --text-muted: #7c6f5a; --text-accent: #a05a2c;
            --border-color: #d3c4a5; --highlight-bg: #ebe1c9;
            --button-bg: #a05a2c; --button-text: #fdf6e3; --button-hover: #864822;
            --feedback-success-bg: #e6f4ea; --feedback-success-border: #8ab893; --feedback-success-text: #2e4c35;
            --feedback-error-bg: #f9e3e3; --feedback-error-border: #d48f8f; --feedback-error-text: #5c2b2b;
        }[data-theme="contrast"] {
            --bg-body: #000000; --bg-card: #000000; --bg-header: #000000;
            --text-main: #ffffff; --text-muted: #dddddd; --text-accent: #ffff00;
            --border-color: #ffffff; --highlight-bg: #333333;
            --button-bg: #ffff00; --button-text: #000000; --button-hover: #e6e600;
            --feedback-success-bg: #000000; --feedback-success-border: #00ff00; --feedback-success-text: #00ff00;
            --feedback-error-bg: #000000; --feedback-error-border: #ff0000; --feedback-error-text: #ff0000;
        }

        /* --- Global Reset & Layout --- */
        * { box-sizing: border-box; }
        
        body {
            font-family: var(--font-main);
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color var(--transition-speed), color var(--transition-speed);
            line-height: 1.6;
        }

        /* --- Header --- */
        header {
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        header.unpinned { position: relative; box-shadow: none; }

        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; flex-wrap: wrap; gap: 15px;
        }

        header h1 { font-size: 1.5rem; margin: 0; color: var(--text-accent); font-weight: 700; }

        .controls-wrapper { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

        /* --- Custom Theme Builder --- */
        .custom-builder {
            display: none; flex-wrap: wrap; gap: 15px;
            background-color: var(--bg-card); padding: 10px 15px;
            border-radius: 8px; border: 1px solid var(--border-color);
            margin-top: 5px; font-size: 0.85rem; animation: fadeIn 0.3s;
            width: 100%; justify-content: flex-end;
        }
        .custom-builder.active { display: flex; }
        .color-picker-group { display: flex; align-items: center; gap: 8px; }
        .color-picker-group input[type="color"] {
            border: none; width: 25px; height: 25px; border-radius: 4px;
            cursor: pointer; padding: 0; background: none;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Controls --- */
        .header-btn {
            background-color: var(--highlight-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-btn:hover {
            border-color: var(--text-accent);
            color: var(--text-accent);
        }

        .pin-btn {
            background: none; border: 1px solid var(--border-color); color: var(--text-main);
            cursor: pointer; padding: 0 10px; border-radius: 6px; font-size: 1rem;
            transition: background-color 0.2s; height: 34px; display: flex;
            align-items: center; justify-content: center;
        }
        .pin-btn:hover { background-color: var(--highlight-bg); }
        .pin-btn.pin-active { background-color: rgba(0, 0, 0, 0.1); }

        select#theme-select {
            padding: 0 12px; border-radius: 6px; border: 1px solid var(--border-color);
            background-color: var(--bg-card); color: var(--text-main);
            cursor: pointer; font-family: inherit; height: 34px;
        }

        /* --- Section Navigation --- */
        .section-nav { display: flex; gap: 10px; flex-wrap: wrap; }
        .section-nav button {
            background-color: var(--highlight-bg); color: var(--text-main);
            border: 1px solid var(--border-color); padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-size: 0.85rem;
            font-weight: 500; transition: all 0.2s;
        }
        .section-nav button:hover { border-color: var(--text-accent); color: var(--text-accent); }

        /* --- Main Content --- */
        .container {
            max-width: 850px;
            margin: 2rem auto;
            padding: 0 1rem 4rem 1rem;
        }

        .section-header {
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--text-accent);
            color: var(--text-accent);
            font-size: 1.5rem;
            font-weight: 700;
            scroll-margin-top: 150px; /* Offset for sticky header */
        }

        /* --- Question Card --- */
        .question-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }

        .lo-box {
            background-color: var(--highlight-bg);
            border-left: 4px solid var(--text-accent);
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-style: italic;
            display: none; /* Hidden by default */
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        /* --- Options --- */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option-label {
            display: flex;
            align-items: flex-start;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-label:hover {
            background-color: var(--highlight-bg);
            border-color: var(--text-muted);
        }

        .option-label input {
            margin-top: 0.3rem;
            margin-right: 1rem;
            accent-color: var(--text-accent);
            transform: scale(1.2);
        }

        /* --- Buttons --- */
        .btn-check {
            margin-top: 1.5rem;
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 1rem;
        }

        .btn-check:hover {
            opacity: 0.9;
        }

        .btn-link {
            display: inline-block;
            background-color: var(--button-bg);
            color: var(--button-text);
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            transition: opacity 0.2s;
            font-size: 1rem;
        }

        .btn-link:hover {
            opacity: 0.9;
        }

        /* --- Feedback Area --- */
        .feedback {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 8px;
            display: none; /* Hidden by default */
            border: 1px solid transparent;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback.correct {
            background-color: var(--feedback-success-bg);
            border-color: var(--feedback-success-border);
            color: var(--feedback-success-text);
        }

        .feedback.incorrect {
            background-color: var(--feedback-error-bg);
            border-color: var(--feedback-error-border);
            color: var(--feedback-error-text);
        }

        .feedback-header {
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .rationale {
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        .source {
            display: block;
            margin-top: 1rem;
            font-size: 0.85rem;
            opacity: 0.8;
            font-style: italic;
            border-top: 1px dashed currentColor;
            padding-top: 0.5rem;
        }

        /* --- Mobile Tweaks --- */
        @media (max-width: 768px) {
            .header-top { flex-direction: column; align-items: flex-start; }
            .controls-wrapper { width: 100%; justify-content: flex-start; }
            .section-nav { justify-content: flex-start; }
            .custom-builder { justify-content: flex-start; }
            header h1 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="header-top">
            <h1>Week 36 Practice Quiz 2</h1>
            <div class="controls-wrapper">
                
                <!-- Reveal LOs Button -->
                <button id="reveal-all-btn" class="header-btn" onclick="toggleAllLOs()">Show Learning Objectives</button>
                
                <!-- Pin Button -->
                <button class="pin-btn pin-active" id="pin-btn" onclick="toggleHeader()" title="Pin/Unpin Header">📌</button>
                
                <!-- Theme Selector -->
                <div class="theme-control">
                    <select id="theme-select" onchange="changeTheme(this.value)">
                        <option value="dark">Modern Dark</option>
                        <option value="midnight">Midnight</option>
                        <option value="light">Modern Light</option>
                        <option value="legacy-dark">Legacy Dark</option>
                        <option value="sepia">Sepia</option>
                        <option value="contrast">High Contrast</option>
                        <option value="custom">⚙️ Custom...</option>
                    </select>
                </div>
            </div>
            
            <!-- Custom Theme Color Pickers -->
            <div class="custom-builder" id="custom-builder">
                <div class="color-picker-group">
                    <label>Background:</label>
                    <input type="color" id="color-bg" value="#1a1a2e" oninput="updateCustomTheme()">
                </div>
                <div class="color-picker-group">
                    <label>Cards:</label>
                    <input type="color" id="color-card" value="#16213e" oninput="updateCustomTheme()">
                </div>
                <div class="color-picker-group">
                    <label>Text:</label>
                    <input type="color" id="color-text" value="#e94560" oninput="updateCustomTheme()">
                </div>
                <div class="color-picker-group">
                    <label>Accent:</label>
                    <input type="color" id="color-accent" value="#0f3460" oninput="updateCustomTheme()">
                </div>
            </div>
        </div>
        
        <!-- Dynamic Navigation Bar -->
        <div class="section-nav" id="section-nav"></div>
    </header>

    <div class="container">
        <div id="quiz-root">
            <!-- Content injected via JS -->
        </div>
    </div>

    <script>
        // --- Data ---
        const quizData =[
            // --- Section 1: Oral Pathology and Upper GI Disorders ---
            {
                section: "Oral Pathology and Upper GI Disorders",
                fullLO: "LO1: Describe and recognize selected benign conditions and infections of the oral cavity.",
                question: "A 22-year-old female medical student presents to the student health clinic complaining of an extremely painful sore in her mouth that developed during final exams. Examination of the buccal mucosa reveals a shallow, superficial ulceration covered by a thin exudate and rimmed by erythema. The physician reassures her that the condition is idiopathic and should resolve without intervention. What is the expected time frame for the spontaneous resolution of this lesion?",
                options: {
                    A: "1 to 3 days",
                    B: "7 to 10 days",
                    C: "14 to 21 days",
                    D: "4 to 6 weeks",
                    E: "Does not resolve without antiviral therapy"
                },
                correctAnswer: "B",
                rationale: "The patient's presentation of an extremely painful, shallow mucosal ulceration covered by a thin exudate and rimmed by erythema during a period of stress is characteristic of an aphthous ulcer (canker sore). These lesions resolve spontaneously in 7-10 days.",
                source: "Oral and Upper Gastrointestinal Pathology PDF, slide 6: 'APHTHOUS ULCERS (CANKER SORES) • Superficial mucosal ulceration • Shallow ulcerations covered by thin exudate • Rimmed by erythema... • Extremely painful. • Recurrent (may be stress induced) • Cause is unknown (idiopathic) • Resolves spontaneously in 7-10 days'"
            },
            {
                section: "Oral Pathology and Upper GI Disorders",
                fullLO: "LO1: Describe and recognize selected benign conditions and infections of the oral cavity.",
                question: "A 45-year-old male with a history of AIDS presents with mouth discomfort. Oral examination reveals multiple superficial, white inflammatory membranes on his palate. The physician is easily able to scrape off one of the white plaques, revealing an underlying erythematous base. Which of the following organisms is the most likely cause of this patient's condition?",
                options: {
                    A: "Candida albicans",
                    B: "Epstein-Barr virus",
                    C: "Helicobacter pylori",
                    D: "Herpes simplex virus type 1",
                    E: "Staphylococcus aureus"
                },
                correctAnswer: "A",
                rationale: "Oral candidiasis (thrush) is the most common fungal infection of the oral cavity and is caused by Candida albicans. It is associated with immunosuppression (such as AIDS) and presents as superficial, white inflammatory pseudomembranes that are easily scraped off to reveal an underlying erythematous base.",
                source: "Oral and Upper Gastrointestinal Pathology PDF, slide 8: 'ORAL CANDIDIASIS (THRUSH) • Most common fungal infection of the oral cavity • Candida albicans... • Disease (overgrowth) associated with: • Immunosuppression (diabetics, transplant patients, AIDS)... • Pseudomembranes • Superficial, white inflammatory membrane • Easily scraped off – underlying erythematous base'"
            },
            {
                section: "Oral Pathology and Upper GI Disorders",
                fullLO: "LO2: Discuss the risk factors, precursor lesions, and clinicopathologic aspects of oral squamous cell carcinoma.",
                question: "A 65-year-old man with a 40-pack-year smoking history undergoes an oral examination. The dentist notes a white patch on the lateral border of the patient's tongue. The patch cannot be scraped off. A biopsy of the lesion is recommended. Which of the following best describes the rationale for always performing a biopsy on this specific type of lesion?",
                options: {
                    A: "Approximately 25% are premalignant and will progress to squamous cell carcinoma.",
                    B: "It is caused by Epstein-Barr virus and requires viral subtyping.",
                    C: "It is the most common benign tumor of the oral cavity.",
                    D: "It represents a focal systemic mastocytosis infection.",
                    E: "More than 50% are malignant at the time of initial presentation."
                },
                correctAnswer: "A",
                rationale: "A white patch or plaque that cannot be scraped off is termed leukoplakia. It is caused by epidermal thickening or hyperkeratosis and is strongly associated with tobacco use. It must always be biopsied because approximately 25% are premalignant and will progress to squamous cell carcinoma. (Note: Erythroplakia is a \"red patch\" where more than 50% are premalignant).",
                source: "Oral and Upper Gastrointestinal Pathology PDF, slide 9: 'LEUKOPLAKIA • “White patch” or plaque • Cannot be scraped off • Caused by epidermal thickening or hyperkeratosis • ~25% are premalignant and will progress to squamous cell carcinoma. • Always biopsy because of high risk for progression to oral squamous cell carcinoma.'"
            },
            {
                section: "Oral Pathology and Upper GI Disorders",
                fullLO: "LO2: Discuss the risk factors, precursor lesions, and clinicopathologic aspects of oral squamous cell carcinoma.",
                question: "A 50-year-old man is diagnosed with oral squamous cell carcinoma (SCC). Pathologic evaluation of the tumor reveals that it involves the tonsillar crypts and base of the tongue, and has a nonkeratinizing, basaloid morphology. The oncologist notes that this specific subtype of SCC generally carries a better prognosis than tobacco-associated SCC. Which of the following is the most likely primary risk factor for this patient's tumor?",
                options: {
                    A: "Chronic alcohol consumption",
                    B: "Epstein-Barr virus",
                    C: "Human papillomavirus (HPV)",
                    D: "Immunosuppression from HIV/AIDS",
                    E: "Smoked tobacco"
                },
                correctAnswer: "C",
                rationale: "Oral squamous cell carcinoma associated with Human papillomavirus (HPV), specifically high-risk types like HPV-16, frequently involves the tonsillar crypts and base of the tongue. It often presents with a nonkeratinizing, basaloid morphology and carries a better prognosis than HPV-negative (tobacco/alcohol-associated) tumors.",
                source: "Oral and Upper Gastrointestinal Pathology PDF, slide 13: 'SQUAMOUS CELL CARCINOMA... 2) Human papillomavirus (HPV) • High-risk types, HPV-16... • Tonsillar crypts, base of tongue, oropharynx • Frequently nonkeratinizing, basaloid • Prognosis for HPV + tumors is better than for HPV – tumors'"
            },
            {
                section: "Oral Pathology and Upper GI Disorders",
                fullLO: "LO3: Describe clinicopathologic aspects of selected benign entities and neoplasms of the salivary glands.",
                question: "A 45-year-old female presents to the clinic with a painless, slow-growing, moveable mass at the angle of her jaw. Surgical excision of the mass is performed. Histopathologic examination of the parotid gland tumor reveals epithelial cells forming ducts and acini mixed within a myxomatous and cartilaginous stroma. Which of the following is the most likely diagnosis?",
                options: {
                    A: "Ameloblastoma",
                    B: "Dentigerous cyst",
                    C: "Mucoepidermoid carcinoma",
                    D: "Pleomorphic adenoma",
                    E: "Warthin tumor"
                },
                correctAnswer: "D",
                rationale: "Pleomorphic adenoma is the most common benign tumor of the salivary glands, typically presenting in females as a painless, slow-growing, moveable mass at the angle of the jaw (parotid gland). The defining histologic feature is its pleomorphic nature, containing both epithelial cells (ducts, acini) and stromal elements (myxomatous stroma, cartilaginous tissue).",
                source: "Oral and Upper Gastrointestinal Pathology PDF, slide 20: 'PLEOMORPHIC ADENOMA • Most common benign tumor (90%) • Parotid is most common site • Female predominance • Painless, slow-growing, moveable mass at angle of the jaw • Pleomorphic = • Epithelial cells- ducts, acini, tubules, strands, sheets • Myxomatous stroma • Cartilaginous'"
            },
            {
                section: "Oral Pathology and Upper GI Disorders",
                fullLO: "LO3: Describe clinicopathologic aspects of selected benign entities and neoplasms of the salivary glands.",
                question: "A 60-year-old male with a heavy smoking history presents with bilateral swellings in his parotid glands. Microscopic evaluation of a biopsy sample demonstrates cystic glandular structures lined by a two-tiered epithelium, surrounded by abundant benign lymphoid tissue. Which of the following is the most likely diagnosis?",
                options: {
                    A: "Ameloblastoma",
                    B: "Mucoepidermoid carcinoma",
                    C: "Pleomorphic adenoma",
                    D: "Squamous cell carcinoma",
                    E: "Warthin tumor"
                },
                correctAnswer: "E",
                rationale: "Warthin tumor is a benign parotid gland tumor that is male predominant, strongly associated with smokers, and can be bilateral. It is characterized by two distinct components: cystic glandular structures lined by two-tiered epithelium and benign lymphoid tissue.",
                source: "Oral and Upper Gastrointestinal Pathology PDF, slide 21: 'WARTHIN TUMOR • Benign parotid gland tumor • Male predominant • Can be bilateral • Smokers, smokers, smokers • 2 characteristic components: • Cystic glandular structures lined by two-tiered epithelium • Benign lymphoid tissue'"
            },
            {
                section: "Oral Pathology and Upper GI Disorders",
                fullLO: "LO4: Describe two common odontogenic tumors in terms of their histopathology and radiologic appearance.",
                question: "A 16-year-old boy undergoes a routine dental radiograph, which reveals a radiolucency surrounding the crown of an unerupted third molar. The lesion is excised, and histopathology shows a cystic space lined by non-keratinizing squamous epithelium. Which of the following is the most likely diagnosis?",
                options: {
                    A: "Ameloblastoma",
                    B: "Dentigerous cyst",
                    C: "Gastrinoma",
                    D: "Leukoplakia",
                    E: "Pleomorphic adenoma"
                },
                correctAnswer: "B",
                rationale: "A dentigerous cyst is the most common odontogenic cyst. It derives from epithelial elements of dental origin and is classically associated with an unerupted or impacted tooth. Histologically, it is a cyst lined by non-keratinizing squamous epithelium.",
                source: "Oral and Upper Gastrointestinal Pathology PDF, slide 25: 'DENTIGEROUS CYST Most common odontogenic cyst Derives from epithelial elements of dental origin (odontogenic origin) • Associated with an unerupted/ impacted teeth... Histopathology: cyst lined by non-keratinizing squamous epithelium'"
            },
            {
                section: "Oral Pathology and Upper GI Disorders",
                fullLO: "LO4: Describe two common odontogenic tumors in terms of their histopathology and radiologic appearance.",
                question: "A 35-year-old woman presents with a swelling in her mandible. A radiograph of the jaw shows a multilocular, \"soap bubble\" radiolucency. Biopsy reveals palisaded basal cells exhibiting reverse polarity, where the nuclei are situated away from the basement membrane, along with stellate reticulum. Which of the following is the most likely diagnosis?",
                options: {
                    A: "Ameloblastoma",

                    C: "Mucoepidermoid carcinoma",
                    D: "Pleomorphic adenoma",
                    E: "Warthin tumor"
                },
                correctAnswer: "A",
                rationale: "Ameloblastoma is a locally aggressive tumor located in the mandible that presents radiologically with a classic \"soap bubble\" appearance. Histopathologically, it is characterized by palisaded basal cells with reverse polarity (nuclei away from the basement membrane) and stellate reticulum (star-shaped cells).",
                source: "Oral and Upper Gastrointestinal Pathology PDF, slide 26: 'AMELOBLASTOMA... Located in mandible • Radiolucency = “soap bubble” appearance • Locally aggressive • Histopathology: • Palisaded basal cells with reverse polarity (nuclei away from basement membrane) • Stellate reticulum (star-shaped cells)'"
            },
            {
                section: "Oral Pathology and Upper GI Disorders",
                fullLO: "LO5: Discuss selected pathologic conditions of the esophagus in terms of their presentation, pathophysiology, and histopathology.",
                question: "A 32-year-old atopic male presents with difficulty swallowing and episodes of food impaction. Endoscopy reveals circumferential rings in the esophagus (feline esophagus). A biopsy is taken, and histopathologic examination demonstrates a prominent epithelial infiltration by large numbers of eosinophils, including eosinophilic microabscesses (clusters of >4). Which of the following treatments is most appropriate for managing this patient's underlying condition?",

        // --- Core Logic ---
        const quizRoot = document.getElementById('quiz-root');
        const themeSelect = document.getElementById('theme-select');
        const pinBtn = document.getElementById('pin-btn');
        const mainHeader = document.getElementById('main-header');
        const sectionNav = document.getElementById('section-nav');
        const customBuilder = document.getElementById('custom-builder');
        const rootElements = document.documentElement;

        let isRevealed = false;

        function toggleAllLOs() {
            isRevealed = !isRevealed;
            const btn = document.getElementById('reveal-all-btn');
            btn.textContent = isRevealed ? "Hide Learning Objectives" : "Show Learning Objectives";
            
            document.querySelectorAll('.lo-box').forEach(box => {
                box.style.display = isRevealed ? 'block' : 'none';
            });
        }

        function initQuiz() {
            let currentSection = "";
            let sectionIndex = 0;
            
            quizData.forEach((item, index) => {
                if (item.section !== currentSection) {
                    currentSection = item.section;
                    
                    const sectionId = 'sec-' + sectionIndex;
                    
                    const sectionHeader = document.createElement('h2');
                    sectionHeader.className = 'section-header';
                    sectionHeader.id = sectionId;
                    sectionHeader.textContent = currentSection;
                    quizRoot.appendChild(sectionHeader);

                    const navBtn = document.createElement('button');
                    let btnText = currentSection;
                    if (btnText.includes("Oral Pathology")) btnText = "Oral Path & Upper GI";
                    if (btnText.includes("GI General Principles")) btnText = "GI Principles & Secretions";
                    if (btnText.includes("Motility and Related Reflexes")) btnText = "Motility & Reflexes";
                    if (btnText.includes("Celiac Trunk")) btnText = "Celiac Trunk & Viscera";
                    
                    navBtn.textContent = btnText;
                    navBtn.onclick = () => {
                        document.getElementById(sectionId).scrollIntoView({ behavior: 'smooth' });
                    };
                    sectionNav.appendChild(navBtn);

                    sectionIndex++;
                }

                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-card-${index}`;

                const loBox = document.createElement('div');
                loBox.className = 'lo-box';
                loBox.id = `lo-${index}`;
                loBox.innerHTML = item.fullLO;
                card.appendChild(loBox);

                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerHTML = `${index + 1}. ${item.question}`;
                card.appendChild(qText);

                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';

                for (const[key, value] of Object.entries(item.options)) {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    
                    const input = document.createElement('input');
                    input.type = 'radio';
                    input.name = `question-${index}`;
                    input.value = key;

                    const span = document.createElement('span');
                    span.innerHTML = `${key}. ${value}`;

                    label.appendChild(input);
                    label.appendChild(span);
                    optionsGrid.appendChild(label);
                }
                card.appendChild(optionsGrid);

                const btn = document.createElement('button');
                btn.className = 'btn-check';
                btn.textContent = 'Check Answer';
                btn.onclick = () => checkAnswer(index);
                card.appendChild(btn);

                const feedback = document.createElement('div');
                feedback.className = 'feedback';
                feedback.id = `feedback-${index}`;
                card.appendChild(feedback);

                quizRoot.appendChild(card);
            });

            const returnContainer = document.createElement('div');
            returnContainer.style.textAlign = 'center';
            returnContainer.style.marginTop = '2rem';
            
            const returnBtn = document.createElement('a');
            returnBtn.href = 'https://ibecerramcg.github.io/GI-GU-ENDO-Practice-Quizzes/';
            returnBtn.className = 'btn-link';
            returnBtn.textContent = '← Return to Quiz Directory';
            
            returnContainer.appendChild(returnBtn);
            quizRoot.appendChild(returnContainer);

            const savedTheme = localStorage.getItem('quizTheme') || 'dark';
            themeSelect.value = savedTheme;
            changeTheme(savedTheme);

            const savedPinState = localStorage.getItem('headerPinned');
            toggleHeader(savedPinState !== 'false');
        }

        function checkAnswer(index) {
            const selected = document.querySelector(`input[name="question-${index}"]:checked`);
            const feedbackEl = document.getElementById(`feedback-${index}`);
            const data = quizData[index];

            if (!selected) {
                alert("Please select an answer.");
                return;
            }

            const isCorrect = selected.value === data.correctAnswer;
            
            let html = `<span class="feedback-header">${isCorrect ? "Correct!" : "Incorrect"}</span>`;
            if (!isCorrect) {
                html += `<div>The correct answer is <strong>${data.correctAnswer}</strong>.</div>`;
            }
            
            html += `<div class="rationale"><strong>Rationale:</strong> ${data.rationale}</div>`;
            html += `<div class="source"><strong>Source:</strong> ${data.source}</div>`;

            feedbackEl.innerHTML = html;
            feedbackEl.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
            feedbackEl.style.display = 'block';
        }

        function changeTheme(themeName) {
            localStorage.setItem('quizTheme', themeName);
            
            if (themeName === 'custom') {
                rootElements.removeAttribute('data-theme');
                customBuilder.classList.add('active');
                loadCustomTheme();
            } else {
                rootElements.setAttribute('data-theme', themeName);
                customBuilder.classList.remove('active');
                rootElements.removeAttribute('style');
            }
        }

        function updateCustomTheme() {
            const bg = document.getElementById('color-bg').value;
            const card = document.getElementById('color-card').value;
            const text = document.getElementById('color-text').value;
            const accent = document.getElementById('color-accent').value;

            rootElements.style.setProperty('--bg-body', bg);
            rootElements.style.setProperty('--bg-header', bg);
            rootElements.style.setProperty('--bg-card', card);
            rootElements.style.setProperty('--highlight-bg', card);
            rootElements.style.setProperty('--text-main', text);
            rootElements.style.setProperty('--text-accent', accent);
            rootElements.style.setProperty('--button-bg', accent);
            rootElements.style.setProperty('--button-text', bg);
            rootElements.style.setProperty('--border-color', accent + '40');

            const customColors = { bg, card, text, accent };
            localStorage.setItem('customThemeColors', JSON.stringify(customColors));
        }

        function loadCustomTheme() {
            const savedColors = JSON.parse(localStorage.getItem('customThemeColors'));
            if (savedColors) {
                document.getElementById('color-bg').value = savedColors.bg;
                document.getElementById('color-card').value = savedColors.card;
                document.getElementById('color-text').value = savedColors.text;
                document.getElementById('color-accent').value = savedColors.accent;
                updateCustomTheme();
            } else {
                updateCustomTheme();
            }
        }

        function toggleHeader(forceState) {
            const isCurrentlyPinned = !mainHeader.classList.contains('unpinned');
            const newState = (typeof forceState === 'boolean') ? forceState : !isCurrentlyPinned;

            if (newState) {
                mainHeader.classList.remove('unpinned');
                pinBtn.classList.add('pin-active');
                localStorage.setItem('headerPinned', 'true');
            } else {
                mainHeader.classList.add('unpinned');
                pinBtn.classList.remove('pin-active');
                localStorage.setItem('headerPinned', 'false');
            }
        }

        document.addEventListener('DOMContentLoaded', initQuiz);

    </script>
